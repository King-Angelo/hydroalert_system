; HydroAlert ESP32 — anonymous Firebase Auth + Firestore REST (telemetry)
; Copy include/secrets.example.h → include/secrets.h and fill in values.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson @ ^7.2.1
build_flags =
  -DCORE_DEBUG_LEVEL=0
