# Example Render Blueprint: THREE Web Services (dev / staging / production).
#
# Copy sections into your repo's `render.yaml` or create three services manually.
# **Do not** put `FIREBASE_SERVICE_ACCOUNT_JSON` or `CRON_SECRET` in Git — add those
# in the Render dashboard for each service after the blueprint syncs.
#
# This layout matches github.com/King-Angelo/hydroalert_system: project files live
# under `hydroalert_system/` at the Git root. Use rootDir: hydroalert_system (not
# backend/api, not "Dockerfile"). buildFilter paths are always repo-root-relative.
#
# If your Git root IS `hydroalert_system` (apps/ backend/ at top level), omit rootDir
# and change buildFilter to backend/api/** and packages/shared_models/**.

services:
  - type: web
    name: hydroalert-api-dev
    runtime: docker
    rootDir: hydroalert_system
    dockerfilePath: backend/api/Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - hydroalert_system/backend/api/**
        - hydroalert_system/packages/shared_models/**
    region: oregon
    plan: free
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: hydroalert-dev
      - key: FCM_DRY_RUN
        value: "true"

  - type: web
    name: hydroalert-api-staging
    runtime: docker
    rootDir: hydroalert_system
    dockerfilePath: backend/api/Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - hydroalert_system/backend/api/**
        - hydroalert_system/packages/shared_models/**
    region: oregon
    plan: free
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: hydroalert-staging
      - key: FCM_DRY_RUN
        value: "true"

  - type: web
    name: hydroalert-api-production
    runtime: docker
    rootDir: hydroalert_system
    dockerfilePath: backend/api/Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - hydroalert_system/backend/api/**
        - hydroalert_system/packages/shared_models/**
    region: oregon
    plan: free
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: hydroalert-prod
      - key: FCM_DRY_RUN
        value: "false"
