name: hydroalert_workspace
publish_to: none

environment:
  sdk: '^3.11.0' # This fulfills the requirement and enables workspaces

workspace:
  - apps/admin_app
  - apps/resident_app
  - apps/official_app
  # backend/api is excluded: Dart Frog + firebase_admin deps conflict with Flutter workspace (intl, etc.)
  - packages/*