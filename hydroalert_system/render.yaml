# Render Blueprint — HydroAlert API (single default service; usually **dev**).
#
# For **staging + production** as separate Web Services (different Firebase projects +
# different `FIREBASE_SERVICE_ACCOUNT_JSON` in the dashboard), see:
#   docs/RENDER_PER_ENVIRONMENT.md
#   docs/examples/render-multi-env.yaml
#
# Deploy: Render Dashboard → New → Blueprint → connect repo.
# Secrets (service account JSON, CRON_SECRET): set per service in the dashboard — never commit.

services:
  - type: web
    name: hydroalert-api
    runtime: docker
    rootDir: backend/api
    region: oregon
    plan: free
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: hydroalert-dev
